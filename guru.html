<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guru - Belajar Inovasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; left: 0; top: 0; width: 100%; } }
        .card-id { background-image: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); }
    </style>
</head>
<body class="bg-slate-50 p-6 font-sans text-slate-800">
    
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 border-l-8 border-l-blue-600">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-800" id="userName">Bapak/Ibu Guru</h1>
                <p class="text-slate-500 font-medium text-sm mt-1">Akses Mengajar: <span id="kelasAkses" class="font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded"></span></p>
            </div>
            <div class="flex gap-3">
                <a href="index.html" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl shadow-md hover:bg-blue-700 transition font-bold flex items-center gap-2">📷 Absen Kelas</a>
                <button onclick="logout()" class="bg-slate-200 text-slate-700 px-5 py-2.5 rounded-xl hover:bg-red-500 hover:text-white transition font-bold">Keluar</button>
            </div>
        </header>

        <h2 class="text-lg font-bold mb-3 text-slate-700">Analitik Kehadiran Kelas Saya</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 border-l-4 border-blue-600">
                <p class="text-xs font-bold text-gray-500 uppercase mb-1">Hari Ini</p>
                <h3 class="text-xl font-black text-gray-800" id="p-today">M: 0 | 0%</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 border-l-4 border-indigo-600">
                <p class="text-xs font-bold text-gray-500 uppercase mb-1">Minggu Ini</p>
                <h3 class="text-xl font-black text-gray-800" id="p-week">M: 0 | 0%</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 border-l-4 border-emerald-600">
                <p class="text-xs font-bold text-gray-500 uppercase mb-1">Bulan Ini</p>
                <h3 class="text-xl font-black text-gray-800" id="p-month">M: 0 | 0%</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 border-l-4 border-orange-600">
                <p class="text-xs font-bold text-gray-500 uppercase mb-1">Semester Ini</p>
                <h3 class="text-xl font-black text-gray-800" id="p-sem">M: 0 | 0%</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-600 mb-4 text-xl">🪪</div>
                <h3 class="font-extrabold mb-1 text-lg">Cetak Kartu Siswa</h3>
                <p class="text-sm text-slate-500 mb-5">Hanya mencetak ID Card siswa dari kelas Anda.</p>
                <button onclick="cetakKartu()" class="w-full bg-indigo-600 text-white py-3 font-bold rounded-xl hover:bg-indigo-700 transition">Cetak Barcode Siswa</button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="w-10 h-10 bg-emerald-100 rounded-lg flex items-center justify-center text-emerald-600 mb-4 text-xl">📊</div>
                <h3 class="font-extrabold mb-1 text-lg">Cetak Rekap Kelas Saya</h3>
                <div class="flex gap-3 mb-5">
                    <div class="w-full"><label class="text-xs font-bold text-slate-500">Mulai</label><input type="date" id="startDate" class="w-full border border-slate-300 p-2.5 rounded-lg mt-1 outline-none focus:border-emerald-500 text-sm"></div>
                    <div class="w-full"><label class="text-xs font-bold text-slate-500">Akhir</label><input type="date" id="endDate" class="w-full border border-slate-300 p-2.5 rounded-lg mt-1 outline-none focus:border-emerald-500 text-sm"></div>
                </div>
                <button onclick="cetakRekap()" class="w-full bg-emerald-600 text-white py-3 font-bold rounded-xl hover:bg-emerald-700 transition">Tarik & Cetak Data</button>
            </div>
        </div>
    </div>

    <div id="printArea" class="hidden bg-white"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzvIncRef44NK6ayX0F7TSht0qTYVEwZszpzVRxSd7nHOCU01bg3yuuOyI6VbHDG4Oq/exec"; 
        const API_KEY = "belajarinovasi_123";
        const session = JSON.parse(localStorage.getItem('userSession'));
        
        if (!session || session.role !== 'guru') window.location.href = 'login.html';
        document.getElementById('userName').innerText = session.identitas;
        document.getElementById('kelasAkses').innerText = session.kelas_akses;

        window.onload = async () => {
            try {
                // Fetch stats difilter sesuai kelas guru
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_all_stats', api_key: API_KEY, role: 'guru', kelas_akses: session.kelas_akses }) });
                const r = await res.json();
                if(r.success) {
                    const periods = ['today', 'week', 'month', 'sem'];
                    periods.forEach(p => {
                        document.getElementById(`p-${p}`).innerText = `M: ${r.data[p].m} | ${r.data[p].p}%`;
                    });
                }
            } catch (e) { console.error("Gagal muat stats"); }
        };

        async function cetakKartu() {
            document.body.style.cursor = 'wait';
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_siswa_by_kelas', api_key: API_KEY, kelas_akses: session.kelas_akses })});
                const result = await res.json();
                if(result.success && result.data.length > 0) {
                    const printArea = document.getElementById('printArea');
                    let html = `<div class="p-4" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;">`;
                    result.data.forEach(s => {
                        html += `
                        <div class="card-id border border-slate-300 rounded-xl overflow-hidden w-[85mm] h-[55mm] relative shadow-sm" style="page-break-inside: avoid; border: 2px solid #1e3a8a;">
                            <div class="bg-white border-b-2 border-blue-800 p-2 flex items-center gap-2">
                                <div class="w-8 h-8 bg-blue-700 text-white rounded-full flex items-center justify-center font-bold text-[10px]">BI</div>
                                <div class="leading-tight text-center flex-1">
                                    <h2 class="font-bold text-[9px] uppercase text-slate-700">Yayasan Pendidikan</h2>
                                    <h1 class="font-extrabold text-[13px] text-blue-900 uppercase">BELAJAR INOVASI</h1>
                                    <p class="text-[6.5px] text-slate-600">Jl. Pendidikan No. 1, Surabaya</p>
                                </div>
                            </div>
                            <div class="p-3">
                                <p class="text-center font-bold text-slate-800 text-[10px] mb-2 uppercase tracking-widest bg-yellow-300 rounded inline-block px-2 mx-auto border border-yellow-400" style="display:block; width:fit-content;">KARTU PELAJAR</p>
                                <table class="text-[10px] font-bold text-slate-800 w-full mb-1">
                                    <tr><td class="w-10">Nama</td><td>: ${s.nama}</td></tr><tr><td>NIS</td><td>: ${s.nis}</td></tr><tr><td>Kelas</td><td>: ${s.kelas}</td></tr>
                                </table>
                            </div>
                            <div class="absolute bottom-2 left-0 w-full text-center bg-white py-1 border-t border-slate-200">
                                <svg class="barcode h-8 w-11/12 mx-auto" jsbarcode-value="${s.nis}" jsbarcode-displayvalue="false" jsbarcode-margin="0"></svg>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                    printArea.innerHTML = html; printArea.classList.remove('hidden');
                    JsBarcode(".barcode").init();
                    setTimeout(() => { window.print(); printArea.classList.add('hidden'); }, 500);
                } else alert("Tidak ada data siswa.");
            } catch (e) { alert("Error API"); }
            document.body.style.cursor = 'default';
        }

        async function cetakRekap() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if(!start || !end) return alert("Pilih tanggal!");
            document.body.style.cursor = 'wait';

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_rekap', api_key: API_KEY, startDate: start, endDate: end, filterKelas: session.kelas_akses })});
                const result = await res.json();
                if(result.success) {
                    const printArea = document.getElementById('printArea');
                    let html = `
                    <div class="p-8 bg-white text-black font-sans">
                        <div class="text-center border-b-4 border-double border-blue-900 pb-4 mb-6">
                            <h2 class="text-2xl font-extrabold uppercase">Laporan Kehadiran Kelas</h2>
                            <h3 class="text-lg font-bold">Lembaga Pendidikan Belajar Inovasi</h3>
                            <p class="text-sm">Periode: ${start} s/d ${end} | Kelas: ${session.kelas_akses}</p>
                        </div>
                        <table class="w-full border-collapse border border-slate-800 text-sm text-left">
                            <thead><tr class="bg-slate-200"><th class="border border-slate-800 p-2">Tanggal</th><th class="border border-slate-800 p-2">NIS</th><th class="border border-slate-800 p-2">Nama</th><th class="border border-slate-800 p-2">Masuk</th><th class="border border-slate-800 p-2">Pulang</th><th class="border border-slate-800 p-2">Status</th></tr></thead>
                            <tbody>`;
                    result.data.forEach(d => {
                        html += `<tr><td class="border border-slate-800 p-2">${d.tanggal}</td><td class="border border-slate-800 p-2">${d.nis}</td><td class="border border-slate-800 p-2">${d.nama}</td><td class="border border-slate-800 p-2 text-center font-mono">${d.masuk}</td><td class="border border-slate-800 p-2 text-center font-mono">${d.pulang}</td><td class="border border-slate-800 p-2 font-bold">${d.status}</td></tr>`;
                    });
                    html += `</tbody></table></div>`;
                    printArea.innerHTML = html; printArea.classList.remove('hidden');
                    window.print(); printArea.classList.add('hidden');
                }
            } catch (e) { alert("Error API"); }
            document.body.style.cursor = 'default';
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
