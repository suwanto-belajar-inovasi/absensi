<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Belajar Inovasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="bg-gray-50 p-6 font-sans">
    
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Panel Admin</h1>
                <p class="text-gray-500" id="userName">Belajar Inovasi</p>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">📷 Buka Scanner</a>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded shadow hover:bg-red-600">Keluar</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-lg mb-2">🪪 Cetak Kartu Login Barcode</h3>
                <p class="text-sm text-gray-500 mb-4">Print kartu ID siswa dengan barcode terintegrasi.</p>
                <button onclick="cetakKartu()" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">Cetak Semua Kartu Siswa</button>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-lg mb-2">📊 Cetak Rekap Absensi</h3>
                <div class="grid grid-cols-2 gap-2 mb-4 text-sm">
                    <input type="date" id="startDate" class="border p-2 rounded" title="Dari Tanggal">
                    <input type="date" id="endDate" class="border p-2 rounded" title="Sampai Tanggal">
                    <input type="text" id="filterKelas" placeholder="Kelas (kosong=Semua)" class="border p-2 rounded col-span-2">
                </div>
                <button onclick="cetakRekap()" class="w-full bg-emerald-600 text-white py-2 rounded hover:bg-emerald-700">Tarik Data & Cetak Tabel</button>
            </div>
        </div>
    </div>

    <div id="printArea" class="hidden bg-white"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzvIncRef44NK6ayX0F7TSht0qTYVEwZszpzVRxSd7nHOCU01bg3yuuOyI6VbHDG4Oq/exec"; 
        const API_KEY = "belajarinovasi_123";
        const session = JSON.parse(localStorage.getItem('userSession'));
        
        if (!session || session.role !== 'admin') window.location.href = 'login.html';
        document.getElementById('userName').innerText = session.identitas;

        // FUNGSI CETAK KARTU BARCODE
        async function cetakKartu() {
            document.body.style.cursor = 'wait';
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_siswa_by_kelas', api_key: API_KEY, kelas_akses: 'Semua' })});
                const result = await res.json();
                
                if(result.success) {
                    const printArea = document.getElementById('printArea');
                    let html = `<div class="grid grid-cols-2 gap-4 p-4">`;
                    result.data.forEach(s => {
                        html += `
                        <div class="border-2 border-gray-800 p-4 rounded-xl w-[85mm] h-[55mm] inline-block" style="page-break-inside: avoid;">
                            <h3 class="text-center font-bold text-sm">KARTU PELAJAR</h3>
                            <p class="text-xs">Nama: ${s.nama}<br>Kelas: ${s.kelas}<br>NIS: ${s.nis}</p>
                            <svg class="barcode w-full h-12 mt-2" jsbarcode-value="${s.nis}" jsbarcode-displayvalue="false"></svg>
                        </div>`;
                    });
                    html += `</div>`;
                    printArea.innerHTML = html; printArea.classList.remove('hidden');
                    JsBarcode(".barcode").init();
                    setTimeout(() => { window.print(); printArea.classList.add('hidden'); }, 500);
                }
            } catch (e) { alert("Gagal mengambil data"); }
            document.body.style.cursor = 'default';
        }

        // FUNGSI CETAK REKAP TABEL
        async function cetakRekap() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const kelas = document.getElementById('filterKelas').value || "Semua";

            if(!start || !end) return alert("Pilih tanggal awal dan akhir!");
            document.body.style.cursor = 'wait';

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_rekap', api_key: API_KEY, startDate: start, endDate: end, filterKelas: kelas })});
                const result = await res.json();

                if(result.success) {
                    const printArea = document.getElementById('printArea');
                    let html = `
                    <div class="p-8">
                        <h2 class="text-2xl font-bold mb-4 text-center">Laporan Absensi (Belajar Inovasi)</h2>
                        <p class="mb-4 text-center">Periode: ${start} s/d ${end} | Kelas: ${kelas}</p>
                        <table class="w-full border-collapse border border-gray-400 text-sm text-left">
                            <thead><tr class="bg-gray-100"><th class="border border-gray-400 p-2">Tanggal</th><th class="border border-gray-400 p-2">NIS</th><th class="border border-gray-400 p-2">Nama</th><th class="border border-gray-400 p-2">Kelas</th><th class="border border-gray-400 p-2">In</th><th class="border border-gray-400 p-2">Out</th><th class="border border-gray-400 p-2">Status</th></tr></thead>
                            <tbody>`;
                    result.data.forEach(d => {
                        html += `<tr><td class="border border-gray-400 p-2">${d.tanggal}</td><td class="border border-gray-400 p-2">${d.nis}</td><td class="border border-gray-400 p-2">${d.nama}</td><td class="border border-gray-400 p-2">${d.kelas}</td><td class="border border-gray-400 p-2">${d.masuk}</td><td class="border border-gray-400 p-2">${d.pulang}</td><td class="border border-gray-400 p-2">${d.status}</td></tr>`;
                    });
                    html += `</tbody></table></div>`;
                    
                    printArea.innerHTML = html; printArea.classList.remove('hidden');
                    window.print(); printArea.classList.add('hidden');
                }
            } catch (e) { alert("Gagal mengambil data"); }
            document.body.style.cursor = 'default';
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
