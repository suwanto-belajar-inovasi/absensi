<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Siswa - Sistem Absensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sembunyikan scrollbar tapi tetap bisa di-scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12 font-sans">

    <div class="bg-blue-700 text-white px-6 pt-10 pb-20 rounded-b-[2.5rem] shadow-md relative">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white/20 rounded-full border-2 border-white/40 flex items-center justify-center backdrop-blur-sm text-xl">
                    👨‍🎓
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide" id="siswaName">Loading...</h1>
                    <p class="text-blue-200 text-sm mt-0.5" id="siswaNIS">NIS: -</p>
                </div>
            </div>
            <button onclick="logout()" class="p-2.5 bg-red-500/80 hover:bg-red-500 rounded-xl backdrop-blur-sm transition shadow-sm">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </div>
    </div>

    <main class="max-w-md mx-auto px-4 -mt-12 relative z-10 space-y-6">
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex items-center justify-between">
            <div>
                <h2 class="text-gray-800 font-bold text-lg">Absensi Hari Ini</h2>
                <p class="text-gray-500 text-sm">Gunakan kamera untuk scan QR Kelas</p>
            </div>
            <a href="index.html" class="bg-blue-600 hover:bg-blue-700 text-white p-3.5 rounded-xl shadow-md transition flex items-center justify-center">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            </a>
        </div>

        <div>
            <div class="flex justify-between items-end mb-3 px-1">
                <h3 class="text-gray-800 font-bold">Rekap Semester Ini</h3>
                <span class="text-xs font-semibold text-blue-600 bg-blue-100 px-2.5 py-1 rounded-lg">Total Hari: 85</span>
            </div>
            
            <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                <div class="min-w-[100px] bg-white p-4 rounded-2xl shadow-sm border border-gray-100 border-b-4 border-b-green-500">
                    <p class="text-gray-500 text-xs font-medium mb-1">Masuk</p>
                    <h4 class="text-2xl font-bold text-gray-800">78</h4>
                </div>
                <div class="min-w-[100px] bg-white p-4 rounded-2xl shadow-sm border border-gray-100 border-b-4 border-b-blue-500">
                    <p class="text-gray-500 text-xs font-medium mb-1">Izin</p>
                    <h4 class="text-2xl font-bold text-gray-800">3</h4>
                </div>
                <div class="min-w-[100px] bg-white p-4 rounded-2xl shadow-sm border border-gray-100 border-b-4 border-b-yellow-400">
                    <p class="text-gray-500 text-xs font-medium mb-1">Sakit</p>
                    <h4 class="text-2xl font-bold text-gray-800">2</h4>
                </div>
                <div class="min-w-[100px] bg-white p-4 rounded-2xl shadow-sm border border-gray-100 border-b-4 border-b-red-500">
                    <p class="text-gray-500 text-xs font-medium mb-1">Alpha</p>
                    <h4 class="text-2xl font-bold text-gray-800">2</h4>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-gray-800 font-bold">Riwayat Absensi</h3>
                
                <div class="relative">
                    <select id="sortControl" onchange="renderHistory()" class="appearance-none bg-slate-50 border border-slate-200 text-slate-700 text-xs font-medium py-1.5 pl-3 pr-8 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="desc">Terbaru</option>
                        <option value="asc">Terlama</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
            
            <div id="historyContainer" class="space-y-0">
                </div>
        </div>

    </main>

    <script>
        // --- SESSION GUARD ---
        const session = JSON.parse(localStorage.getItem('userSession'));
        if (!session || session.role !== 'siswa') {
            alert("Sesi Anda telah habis. Silakan login kembali.");
            window.location.href = 'login.html';
        } else {
            document.getElementById('siswaName').innerText = session.identitas;
            document.getElementById('siswaNIS').innerText = `NIS: ${session.username}`;
        }

        // --- DATA DUMMY UNTUK RIWAYAT ---
        // Nanti ini diganti dengan data hasil fetch API dari Spreadsheet
        let historyData = [
            { date: '2026-04-07', in: '06:45', out: '15:10', status: 'Masuk' },
            { date: '2026-04-06', in: '07:15', out: '15:15', status: 'Terlambat' },
            { date: '2026-04-05', in: '-', out: '-', status: 'Sakit' },
            { date: '2026-04-04', in: '-', out: '-', status: 'Alpha' },
            { date: '2026-04-03', in: '-', out: '-', status: 'Izin' },
            { date: '2026-04-02', in: '06:50', out: '15:00', status: 'Masuk' }
        ];

        // Konfigurasi Warna Status
        const statusConfig = {
            'Masuk': { bg: 'bg-green-100', text: 'text-green-700', label: 'Hadir' },
            'Terlambat': { bg: 'bg-orange-100', text: 'text-orange-700', label: 'Terlambat' },
            'Sakit': { bg: 'bg-yellow-100', text: 'text-yellow-700', label: 'Sakit' },
            'Izin': { bg: 'bg-blue-100', text: 'text-blue-700', label: 'Izin' },
            'Alpha': { bg: 'bg-red-100', text: 'text-red-700', label: 'Alpha' }
        };

        // Format Tanggal (YYYY-MM-DD ke DD MMM YYYY)
        function formatDate(dateStr) {
            const options = { day: '2-digit', month: 'short', year: 'numeric' };
            return new Date(dateStr).toLocaleDateString('id-ID', options);
        }

        // Render Data ke HTML
        function renderHistory() {
            const container = document.getElementById('historyContainer');
            const sortOrder = document.getElementById('sortControl').value;
            
            container.innerHTML = ''; // Kosongkan container

            // Logika Sorting (Berdasarkan string tanggal)
            let sortedData = [...historyData].sort((a, b) => {
                if (sortOrder === 'desc') return new Date(b.date) - new Date(a.date); // Terbaru
                return new Date(a.date) - new Date(b.date); // Terlama
            });

            sortedData.forEach(item => {
                const config = statusConfig[item.status];
                
                const htmlString = `
                    <div class="flex justify-between items-center py-3 border-b border-gray-100 last:border-0">
                        <div>
                            <p class="text-gray-800 font-semibold text-sm">${formatDate(item.date)}</p>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-xs text-gray-500">Masuk: <span class="font-medium text-gray-700">${item.in}</span></span>
                                <span class="text-gray-300">|</span>
                                <span class="text-xs text-gray-500">Pulang: <span class="font-medium text-gray-700">${item.out}</span></span>
                            </div>
                        </div>
                        <span class="${config.bg} ${config.text} text-xs px-2.5 py-1 rounded-md font-bold tracking-wide">
                            ${config.label}
                        </span>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', htmlString);
            });
        }

        // Jalankan render pertama kali saat halaman dimuat
        renderHistory();

        function logout() {
            localStorage.removeItem('userSession');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
