<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siswa - Belajar Inovasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12 font-sans">
    
    <div class="bg-blue-700 text-white px-6 pt-10 pb-20 rounded-b-[2.5rem] shadow-md">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold" id="siswaName">Loading...</h1>
                <p class="text-blue-200 text-sm" id="siswaNIS">NIS: -</p>
            </div>
            <button onclick="logout()" class="p-2 bg-red-500 rounded-xl hover:bg-red-600 transition">🚪</button>
        </div>
    </div>

    <main class="max-w-md mx-auto px-4 -mt-10 relative z-10 space-y-4">
        
        <a href="index.html" class="flex items-center justify-between bg-white rounded-2xl p-5 shadow border border-gray-100 text-gray-800 font-bold hover:bg-gray-50 transition">
            <span>📷 Scan Absensi Hari Ini</span>
            <span class="bg-blue-600 text-white p-2 rounded-lg">→</span>
        </a>

        <div class="bg-white rounded-2xl p-5 shadow border border-gray-100">
            <h3 class="font-bold text-gray-800 mb-4">🖨️ Cetak Rekap Pribadi</h3>
            <div class="flex gap-2">
                <button onclick="cetakRekap('bulan')" class="flex-1 bg-indigo-100 text-indigo-700 py-2 rounded-lg font-medium hover:bg-indigo-200 text-sm">Bulan Ini</button>
                <button onclick="cetakRekap('semester')" class="flex-1 bg-emerald-100 text-emerald-700 py-2 rounded-lg font-medium hover:bg-emerald-200 text-sm">Semester Ini</button>
            </div>
        </div>

    </main>

    <div id="printArea" class="hidden bg-white"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzvIncRef44NK6ayX0F7TSht0qTYVEwZszpzVRxSd7nHOCU01bg3yuuOyI6VbHDG4Oq/exec"; 
        const API_KEY = "belajarinovasi_123";
        const session = JSON.parse(localStorage.getItem('userSession'));
        
        if (!session || session.role !== 'siswa') window.location.href = 'login.html';
        document.getElementById('siswaName').innerText = session.identitas;
        document.getElementById('siswaNIS').innerText = "NIS: " + session.username;

        // Hitung Otomatis Tanggal
        function getDates(tipe) {
            const now = new Date();
            let start, end = now.toISOString().split('T')[0];
            
            if (tipe === 'bulan') {
                start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            } else { // Semester (asumsi 6 bulan ke belakang dari sekarang)
                const sixMonthsAgo = new Date();
                sixMonthsAgo.setMonth(now.getMonth() - 6);
                start = sixMonthsAgo.toISOString().split('T')[0];
            }
            return { start, end };
        }

        async function cetakRekap(tipe) {
            const { start, end } = getDates(tipe);
            document.body.style.cursor = 'wait';

            try {
                // API Backend otomatis memfilter NIS siswa yang sedang login
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_rekap', api_key: API_KEY, startDate: start, endDate: end, filterNIS: session.username })});
                const result = await res.json();

                if(result.success) {
                    const printArea = document.getElementById('printArea');
                    let html = `
                    <div class="p-6">
                        <h2 class="text-xl font-bold mb-2 text-center">Rekap Absensi Siswa</h2>
                        <p class="mb-4 text-center text-sm">Nama: ${session.identitas} | NIS: ${session.username} <br> Periode: ${start} s/d ${end}</p>
                        <table class="w-full border-collapse border border-gray-400 text-sm text-left">
                            <thead><tr class="bg-gray-100"><th class="border border-gray-400 p-2">Tanggal</th><th class="border border-gray-400 p-2">In</th><th class="border border-gray-400 p-2">Out</th><th class="border border-gray-400 p-2">Status</th></tr></thead>
                            <tbody>`;
                    result.data.forEach(d => {
                        html += `<tr><td class="border border-gray-400 p-2">${d.tanggal}</td><td class="border border-gray-400 p-2">${d.masuk}</td><td class="border border-gray-400 p-2">${d.pulang}</td><td class="border border-gray-400 p-2">${d.status}</td></tr>`;
                    });
                    html += `</tbody></table></div>`;
                    printArea.innerHTML = html; printArea.classList.remove('hidden');
                    window.print(); printArea.classList.add('hidden');
                } else alert("Tidak ada data direntang waktu tersebut.");
            } catch (e) { alert("Error Server"); }
            document.body.style.cursor = 'default';
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
