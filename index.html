<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi - Belajar Inovasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Merapikan UI bawaan library scanner agar menyatu dengan desain kita */
        #reader { width: 100%; border: none !important; }
        #reader__dashboard_section_csr span { font-family: sans-serif; font-size: 14px; }
        #reader__dashboard_section_csr button { background-color: #2563eb !important; color: white !important; border-radius: 8px !important; padding: 6px 12px !important; border: none !important; margin-top: 5px; cursor: pointer; }
        #reader video { border-radius: 12px; object-fit: cover; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center justify-center p-4 font-sans">
    
    <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-sm text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
        
        <h1 class="text-2xl font-extrabold text-gray-800 mb-1 mt-2">Scan ID Card</h1>
        <p class="text-sm text-gray-500 mb-4">Arahkan barcode ke kotak kamera</p>
        
        <div class="mb-4 rounded-2xl overflow-hidden border-2 border-slate-200 bg-slate-50 p-2">
            <div id="reader"></div>
        </div>

        <div id="notification" class="hidden p-3 rounded-xl font-bold mb-4 text-sm transition-all duration-300"></div>
        
        <div class="mb-6 text-left border-t border-slate-100 pt-4 mt-2">
            <label class="block text-xs font-bold text-slate-500 mb-1">Kamera bermasalah? Input manual NIS:</label>
            <div class="flex gap-2">
                <input type="number" id="manualNis" placeholder="Ketik NIS..." class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                <button onclick="prosesManual()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-blue-700 shadow-md">Kirim</button>
            </div>
        </div>

        <button onclick="kembaliKeDashboard()" class="w-full py-3 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition border border-slate-200">
            Kembali ke Dashboard
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzvIncRef44NK6ayX0F7TSht0qTYVEwZszpzVRxSd7nHOCU01bg3yuuOyI6VbHDG4Oq/exec"; // Pastikan diisi URL Web App terbaru Anda
        const API_KEY = "belajarinovasi_123";
        
        let html5QrcodeScanner;
        let isProcessing = false;

        function kembaliKeDashboard() {
            if(html5QrcodeScanner) html5QrcodeScanner.clear();
            const session = JSON.parse(localStorage.getItem('userSession'));
            if(session) window.location.href = session.role + '.html';
            else window.location.href = 'login.html';
        }

        // Fungsi utama mengirim data ke backend
        async function kirimDataAbsen(nisTeks) {
            if (isProcessing) return;
            isProcessing = true; 
            
            // Hentikan scan sementara agar tidak dobel
            if(html5QrcodeScanner && html5QrcodeScanner.getState() === Html5QrcodeScannerState.SCANNING) {
                html5QrcodeScanner.pause(true);
            }
            
            const notif = document.getElementById('notification');
            notif.className = "p-3 rounded-xl font-bold mb-4 bg-blue-100 text-blue-800 block border border-blue-200";
            notif.innerText = "⏳ Memproses Data...";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "absen", api_key: API_KEY, nis: nisTeks })
                });
                const result = await res.json();

                notif.className = `p-3 rounded-xl font-bold mb-4 block border ${result.success ? 'bg-green-100 text-green-800 border-green-300' : 'bg-red-100 text-red-800 border-red-300'}`;
                notif.innerText = result.success ? `✅ ${result.message}` : `❌ ${result.message}`;

                if(result.success) {
                    setTimeout(kembaliKeDashboard, 2000);
                } else {
                    setTimeout(() => { 
                        isProcessing = false; 
                        if(html5QrcodeScanner) html5QrcodeScanner.resume(); 
                        notif.classList.add('hidden'); 
                    }, 3000);
                }
            } catch(e) {
                notif.className = "p-3 rounded-xl font-bold mb-4 bg-red-100 text-red-800 block border border-red-300";
                notif.innerText = "❌ Gagal terhubung ke server.";
                setTimeout(() => { 
                    isProcessing = false; 
                    if(html5QrcodeScanner) html5QrcodeScanner.resume(); 
                }, 3000);
            }
        }

        // Memicu absen dari input manual
        function prosesManual() {
            const nis = document.getElementById('manualNis').value;
            if(!nis) return alert("Masukkan NIS terlebih dahulu!");
            kirimDataAbsen(nis);
        }

        // Inisialisasi Scanner saat halaman dimuat
        window.onload = () => {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { fps: 10, qrbox: {width: 250, height: 150}, rememberLastUsedCamera: true }, 
                false
            );
            
            html5QrcodeScanner.render((decodedText) => {
                // Dipanggil saat barcode berhasil terbaca
                kirimDataAbsen(decodedText);
            }, (errorMessage) => {
                // Diabaikan: ini hanya error saat belum ada barcode yang fokus
            });
        };
    </script>
</body>
</html>
