<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Barcode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Styling tambahan untuk scanner agar lebih rapi di mobile */
        #reader { width: 100%; border-radius: 8px; overflow: hidden; border: none !important; }
        #reader video { border-radius: 8px; object-fit: cover; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Absensi Siswa</h1>
            <p class="text-gray-500 text-sm">Arahkan barcode ke kamera</p>
        </div>

        <div class="mb-4 bg-gray-50 rounded-xl border-2 border-dashed border-gray-300 p-2">
            <div id="reader"></div>
        </div>

        <div id="notification" class="hidden w-full text-center p-3 mb-4 rounded-lg font-medium transition-all"></div>

        <div class="mt-4">
            <p class="text-sm text-gray-500 mb-2 text-center">Atau masukkan NIS secara manual</p>
            <div class="flex gap-2">
                <input type="number" id="nisInput" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ketik NIS...">
                <button id="btnSubmit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center justify-center">
                    <svg id="loadingSpinner" class="animate-spin -ml-1 mr-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="btnText">Kirim</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURASI FRONTEND
        const API_URL = "https://script.google.com/macros/s/AKfycbzvIncRef44NK6ayX0F7TSht0qTYVEwZszpzVRxSd7nHOCU01bg3yuuOyI6VbHDG4Oq/exec"; 
        const API_KEY = "belajarinovasi_123"; // Harus sama dengan di code.gs
        
        let html5QrcodeScanner;
        let isProcessing = false;

        // Inisialisasi Scanner
        function initScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return; // Mencegah scan ganda saat loading
            
            // Jeda scanner
            html5QrcodeScanner.pause(true);
            document.getElementById('nisInput').value = decodedText;
            prosesAbsensi(decodedText);
        }

        function onScanFailure(error) {
            // Abaikan peringatan gagal scan tiap frame
        }

        // Proses Data ke Backend
        async function prosesAbsensi(nis) {
            if(!nis) return;
            isProcessing = true;
            toggleLoading(true);
            showNotif("", "hidden");

            try {
                // Gunakan text/plain untuk menghindari CORS Preflight (OPTIONS) error di Apps Script
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                      action: "absen", // Tambahkan baris ini
                        nis: nis,
                        api_key: API_KEY
                    })
                });

                const result = await response.json();

                if(result.success) {
                    showNotif(result.message, "success");
                    document.getElementById('nisInput').value = ""; // Reset input
                } else {
                    showNotif(result.message, "error");
                }

            } catch (error) {
                showNotif("Gagal menghubungi server. Periksa koneksi internet.", "error");
                console.error(error);
            } finally {
                toggleLoading(false);
                // Resume scanner setelah 3 detik
                setTimeout(() => {
                    isProcessing = false;
                    if(html5QrcodeScanner.getState() === Html5QrcodeScannerState.PAUSED) {
                        html5QrcodeScanner.resume();
                    }
                    showNotif("", "hidden"); // Sembunyikan notif
                }, 3000);
            }
        }

        // Event Listener Tombol Manual
        document.getElementById('btnSubmit').addEventListener('click', () => {
            const nis = document.getElementById('nisInput').value;
            if (nis && !isProcessing) {
                if(html5QrcodeScanner && html5QrcodeScanner.getState() === Html5QrcodeScannerState.SCANNING) {
                    html5QrcodeScanner.pause(true);
                }
                prosesAbsensi(nis);
            }
        });

        // UI Helpers
        function toggleLoading(isLoading) {
            const spinner = document.getElementById('loadingSpinner');
            const btnText = document.getElementById('btnText');
            const btn = document.getElementById('btnSubmit');
            const input = document.getElementById('nisInput');

            if(isLoading) {
                spinner.classList.remove('hidden');
                btnText.innerText = "Proses...";
                btn.disabled = true;
                input.disabled = true;
            } else {
                spinner.classList.add('hidden');
                btnText.innerText = "Kirim";
                btn.disabled = false;
                input.disabled = false;
            }
        }

        function showNotif(message, type) {
            const notif = document.getElementById('notification');
            notif.className = "w-full text-center p-3 mb-4 rounded-lg font-medium transition-all"; // reset class
            
            if (type === "success") {
                notif.classList.add("bg-green-100", "text-green-800", "border", "border-green-300");
                notif.innerHTML = `✅ ${message}`;
            } else if (type === "error") {
                notif.classList.add("bg-red-100", "text-red-800", "border", "border-red-300");
                notif.innerHTML = `❌ ${message}`;
            } else {
                notif.classList.add("hidden");
                return;
            }
        }

        // Jalankan scanner saat halaman dimuat
        window.onload = initScanner;
    </script>
</body>
</html>
