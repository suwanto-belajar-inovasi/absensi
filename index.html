<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Scan Barcode</h1>
        <div id="reader" class="mb-4 rounded-xl overflow-hidden border-2 border-dashed border-blue-300"></div>
        <div id="notification" class="hidden p-3 rounded-lg font-bold mb-4"></div>
        <button onclick="kembaliKeDashboard()" class="text-blue-600 text-sm font-medium hover:underline">← Batal / Kembali ke Dashboard</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzvIncRef44NK6ayX0F7TSht0qTYVEwZszpzVRxSd7nHOCU01bg3yuuOyI6VbHDG4Oq/exec"; // GANTI INI
        const API_KEY = "belajarinovasi_123";
        let scanner, isProcessing = false;

        function kembaliKeDashboard() {
            const session = JSON.parse(localStorage.getItem('userSession'));
            if(session) window.location.href = session.role + '.html';
            else window.location.href = 'login.html';
        }

        window.onload = () => {
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }, false);
            scanner.render(async (text) => {
                if (isProcessing) return;
                isProcessing = true; scanner.pause(true);
                
                const notif = document.getElementById('notification');
                notif.className = "p-3 rounded-lg font-bold mb-4 bg-blue-100 text-blue-800 block";
                notif.innerText = "Memproses...";

                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "absen", api_key: API_KEY, nis: text })
                    });
                    const result = await res.json();

                    notif.className = `p-3 rounded-lg font-bold mb-4 block ${result.success ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
                    notif.innerText = result.message;

                    if(result.success) setTimeout(kembaliKeDashboard, 2000);
                    else setTimeout(() => { isProcessing = false; scanner.resume(); notif.classList.add('hidden'); }, 3000);
                } catch(e) {
                    notif.innerText = "Gagal server.";
                    setTimeout(() => { isProcessing = false; scanner.resume(); }, 3000);
                }
            });
        };
    </script>
</body>
</html>
