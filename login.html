<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Absensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Login Portal</h1>
            <p class="text-sm text-gray-500 mt-1">Masukkan kredensial Anda</p>
        </div>

        <div id="alertBox" class="hidden mb-4 p-3 rounded-lg text-sm text-center font-medium"></div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" required>
            </div>
            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition flex items-center justify-center mt-6">
                <span id="btnText">Masuk Dashboard</span>
            </button>
        </form>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzvIncRef44NK6ayX0F7TSht0qTYVEwZszpzVRxSd7nHOCU01bg3yuuOyI6VbHDG4Oq/exec"; 
        const API_KEY = "belajarinovasi_123";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            const alertBox = document.getElementById('alertBox');
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // UI Loading State
            btn.disabled = true;
            btnText.innerText = "Memeriksa...";
            alertBox.classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        api_key: API_KEY,
                        action: "login", // PERHATIKAN INI: Action menentukan fungsi di backend
                        username: user,
                        password: pass
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alertBox.className = "mb-4 p-3 rounded-lg text-sm text-center font-medium bg-green-100 text-green-800";
                    alertBox.innerText = `Selamat datang, ${result.data.identitas}!`;
                    alertBox.classList.remove('hidden');
                    
                    // Simpan data session ke LocalStorage
                    localStorage.setItem('userSession', JSON.stringify(result.data));

                    // Redirect berdasarkan Role
                    setTimeout(() => {
                        if (result.data.role === 'admin') window.location.href = 'admin.html';
                        else if (result.data.role === 'guru') window.location.href = 'guru.html';
                        else window.location.href = 'siswa.html';
                    }, 1000);

                } else {
                    alertBox.className = "mb-4 p-3 rounded-lg text-sm text-center font-medium bg-red-100 text-red-800";
                    alertBox.innerText = result.message;
                    alertBox.classList.remove('hidden');
                }
            } catch (error) {
                alertBox.className = "mb-4 p-3 rounded-lg text-sm text-center font-medium bg-red-100 text-red-800";
                alertBox.innerText = "Koneksi server gagal.";
                alertBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.innerText = "Masuk Dashboard";
            }
        });
    </script>
</body>
</html>
