<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Belajar Inovasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-800">Sistem Absensi</h1>
            <p class="text-sm text-gray-500">Belajar Inovasi</p>
        </div>
        <div id="alertBox" class="hidden mb-4 p-3 rounded-lg text-sm text-center font-medium"></div>
        <form id="loginForm" class="space-y-4">
            <input type="text" id="username" placeholder="Username / NIS" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
            <input type="password" id="password" placeholder="Password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition">Masuk</button>
        </form>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzvIncRef44NK6ayX0F7TSht0qTYVEwZszpzVRxSd7nHOCU01bg3yuuOyI6VbHDG4Oq/exec"; // GANTI INI
        const API_KEY = "belajarinovasi_123";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const alertBox = document.getElementById('alertBox');
            btn.innerText = "Memeriksa..."; btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", api_key: API_KEY, username: username.value, password: password.value })
                });
                const result = await res.json();

                if (result.success) {
                    alertBox.className = "mb-4 p-3 rounded text-sm bg-green-100 text-green-800 block";
                    alertBox.innerText = "Berhasil Login!";
                    localStorage.setItem('userSession', JSON.stringify(result.data));
                    
                    setTimeout(() => {
                        window.location.href = result.data.role + '.html';
                    }, 1000);
                } else {
                    alertBox.className = "mb-4 p-3 rounded text-sm bg-red-100 text-red-800 block";
                    alertBox.innerText = result.message;
                }
            } catch (err) {
                alertBox.className = "mb-4 p-3 rounded text-sm bg-red-100 text-red-800 block";
                alertBox.innerText = "Koneksi Gagal.";
            } finally {
                btn.innerText = "Masuk"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
