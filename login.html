<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Belajar Inovasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 font-sans">
    
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <img src="https://drive.google.com/uc?export=view&id=1aWHmp6kNKwTYkwEMqVg34_ofiWRkymFe" alt="Logo" class="h-20 mx-auto mb-4 object-contain fallback-logo">
            <h1 class="text-2xl font-extrabold text-blue-900 tracking-tight">SISTEM INFORMASI</h1>
            <p class="text-sm text-gray-500 font-medium">Belajar Inovasi Dashboard</p>
        </div>

        <div id="alertBox" class="hidden mb-5 p-3 rounded-lg text-sm text-center font-semibold"></div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username / NIS</label>
                <input type="text" id="username" placeholder="Masukkan ID Anda" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50 focus:bg-white" required>
            </div>
            
            <div class="relative">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50 focus:bg-white" required>
                <button type="button" onclick="togglePassword()" class="absolute right-3 top-9 text-gray-400 hover:text-blue-600 focus:outline-none">
                    <svg id="eyeIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                </button>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-blue-700 text-white font-bold py-3.5 rounded-xl hover:bg-blue-800 transition shadow-lg shadow-blue-500/30">
                Masuk ke Dashboard
            </button>
        </form>
    </div>

    <footer class="mt-8 text-center text-gray-400 text-xs font-medium">
        <p>&copy; 2026 Belajar Inovasi. All rights reserved.</p>
        <p class="mt-1">Secure Login Portal</p>
    </footer>

    <style>
        /* Fallback jika gambar Drive gagal dimuat */
        img.fallback-logo { background-color: #f3f4f6; border-radius: 50%; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #9ca3af; text-align: center; }
    </style>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzvIncRef44NK6ayX0F7TSht0qTYVEwZszpzVRxSd7nHOCU01bg3yuuOyI6VbHDG4Oq/exec"; 
        const API_KEY = "belajarinovasi_123";

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>`;
            } else {
                input.type = 'password';
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const alertBox = document.getElementById('alertBox');
            btn.innerText = "Memverifikasi..."; btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", api_key: API_KEY, username: username.value, password: password.value })
                });
                const result = await res.json();

                if (result.success) {
                    alertBox.className = "mb-5 p-3 rounded-lg text-sm bg-green-100 text-green-800 border border-green-200 block";
                    alertBox.innerText = "Berhasil Login! Mengalihkan...";
                    localStorage.setItem('userSession', JSON.stringify(result.data));
                    setTimeout(() => { window.location.href = result.data.role + '.html'; }, 1000);
                } else {
                    alertBox.className = "mb-5 p-3 rounded-lg text-sm bg-red-100 text-red-800 border border-red-200 block";
                    alertBox.innerText = result.message;
                }
            } catch (err) {
                alertBox.className = "mb-5 p-3 rounded-lg text-sm bg-red-100 text-red-800 border border-red-200 block";
                alertBox.innerText = "Koneksi ke server gagal. Periksa internet Anda.";
            } finally {
                btn.innerText = "Masuk ke Dashboard"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
